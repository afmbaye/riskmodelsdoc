<!-- Modal Template -->
<div class="modal-overlay" id="formulaModal">
    <div class="modal">
        <div class="modal-header">
            <h3 class="modal-title">Formule: <span class="formula-name"></span></h3>
            <button class="modal-close" onclick="closeModal()">
                <i data-feather="x"></i>
            </button>
        </div>
        <div class="modal-content">
            <div class="formula-container">
                <pre><code class="language-dax formula-code"></code></pre>
            </div>
            <div class="formula-description"></div>
        </div>
    </div>
</div>

<script>
function openModal(formulaName, formulaCode, description) {
    const modal = document.getElementById('formulaModal');
    modal.querySelector('.formula-name').textContent = formulaName;
    modal.querySelector('.formula-code').textContent = formulaCode;
    modal.querySelector('.formula-description').textContent = description;
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    feather.replace();
}

function closeModal() {
    const modal = document.getElementById('formulaModal');
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
}

// Fermer le modal en cliquant en dehors
document.getElementById('formulaModal').addEventListener('click', function(e) {
    if (e.target === this) {
        closeModal();
    }
});
</script>
