<style>
  :root {
    --sidebar-max-width: 280px;
    --sidebar-min-width: 250px;
  }
  
  .layout-wrapper {
    display: flex;
    min-height: 100vh;
    width: 100%;
  }

  .sidebar {
    box-sizing: border-box;
    min-width: var(--sidebar-min-width);
    max-width: var(--sidebar-max-width);
    width: 25%;
    padding: 16px 12px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-x: auto;
    overflow-y: auto;
    background-color: #f8f9fa;
    border-right: 1px solid #e9ecef;
  }

  .main-content {
    flex: 1;
    padding: 32px;
    width: 75%;
    max-width: calc(100% - var(--sidebar-min-width));
  }

  @media (max-width: 768px) {
    .layout-wrapper {
      flex-direction: column;
    }
    .sidebar {
      width: 100%;
      max-width: 100%;
      height: auto;
      position: relative;
    }
    .main-content {
      width: 100%;
      max-width: 100%;
    }
  }
</style>

<!-- Feather Icons (méthode demandée) -->
<script src="https://unpkg.com/feather-icons"></script>
<script>
  feather.replace();

  // Toggle du groupe "Store"
  const btn = document.getElementById('btn-store');
  const menu = document.getElementById('submenu-store');
  const group = document.getElementById('storeGroup');

  btn.addEventListener('click', () => {
    const expanded = btn.getAttribute('aria-expanded') === 'true';
    btn.setAttribute('aria-expanded', String(!expanded));
    menu.style.display = expanded ? 'none' : 'block';

    // change l’icône minus/plus
    const chev = btn.querySelector('.chev');
    chev.outerHTML = expanded
      ? '<i data-feather="plus" class="fi chev" aria-hidden="true"></i>'
      : '<i data-feather="minus" class="fi chev" aria-hidden="true"></i>';
    feather.replace();
  });
</script>
